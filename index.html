<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Collection</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 900px;
  margin: 40px auto;
  background: #fafafa;
  color: #222;
}

h1 { margin-bottom: 10px; }

input[type="search"] {
  width: 100%;
  padding: 10px;
  margin: 20px 0;
  font-size: 16px;
}

.section {
  margin-top: 40px;
}

.section h2 {
  border-bottom: 2px solid #ddd;
  padding-bottom: 6px;
}

.title-btn {
  width: 100%;
  text-align: left;
  background: #eee;
  border: none;
  padding: 10px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.title-content {
  display: none;
  background: #fff;
  padding: 10px 14px;
  border-left: 3px solid #ddd;
}

.item {
  margin-bottom: 12px;
}

.meta {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 6px;
}

.extra {
  font-size: 0.9em;
  margin-top: 4px;
}

.label { font-weight: bold; }

.truncate {
  max-height: 2.8em;
  overflow: hidden;
}

.read-more {
  color: #0066cc;
  cursor: pointer;
  font-size: 0.85em;
  margin-left: 6px;
}

.badge {
  font-size: 0.7em;
  background: #e6f2ff;
  padding: 2px 6px;
  border-radius: 8px;
  margin-left: 6px;
}

button[type="submit"] {
  margin-top: 20px;
  padding: 12px 20px;
  font-size: 1rem;
  background: #007bff;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.user-info label {
  display: block;
  margin-top: 14px;
  font-weight: 500;
}

.user-info input,
.user-info textarea {
  width: 100%;
  padding: 10px;
  margin-top: 4px;
}
</style>
</head>

<body>

<h1>My Collection</h1>

<input type="search" id="search" placeholder="Search by title or cast…" />

<form action="https://formspree.io/f/mnjqvnqz" method="POST" id="tradeForm">
  <div id="list"></div>

  <div class="user-info">
    <label>Email</label>
    <input type="email" name="email" required>

    <label>Link to your collection (optional)</label>
    <input type="text" name="collection">

    <label>Comments</label>
    <textarea name="comments" rows="4"></textarea>
  </div>

  <input type="hidden" name="titles" id="selectedTitles">
  <input type="hidden" name="_subject" id="emailSubject">

  <button type="submit">Send my selections</button>
</form>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoRy5TtpW0igavzsGeFPJyxVmfShOncsDrRO_e3CI0MjASPeoL3KJCIs121cMyfwQdzKntycu-BAV3/pub?output=csv";

let data = [];

Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: results => {
    data = results.data;
    render(data);
  }
});

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  render(data.filter(d =>
    d.Title.toLowerCase().includes(q) ||
    (d.Cast || "").toLowerCase().includes(q)
  ));
});

function groupKey(title) {
  const c = title.charAt(0).toUpperCase();
  if (!c.match(/[A-Z]/)) return "0–9 / Special";
  if (c <= "F") return "A–F";
  if (c <= "L") return "G–L";
  if (c <= "R") return "M–R";
  return "S–Z";
}

function render(rows) {
  const container = document.getElementById("list");
  container.innerHTML = "";

  const groups = {};
  rows.forEach(r => {
    const g = groupKey(r.Title);
    (groups[g] ??= []).push(r);
  });

  Object.keys(groups).forEach(group => {
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<h2>${group}</h2>`;

    groups[group].forEach(r => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "title-btn";
      btn.textContent = r.Title;

      const content = document.createElement("div");
      content.className = "title-content";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.dataset.value = `${r.Title} - ${r.Date} - ${r.Master} - ${r.Link}`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <label>
          ${cb.outerHTML}
          ${r.Location} | ${r.Master} | ${r.Date} | ${r.Format} | ${r.Size}
          ${r.Giftable === "Yes" ? '<span class="badge">Giftable</span>' : ""}
        </label>
      `;

      content.appendChild(meta);

      if (r.Cast) content.appendChild(expandable("Cast", r.Cast));
      if (r.Notes) content.appendChild(expandable("Notes", r.Notes));

      btn.onclick = () => {
        content.style.display = content.style.display === "block" ? "none" : "block";
      };

      sec.append(btn, content);
    });

    container.appendChild(sec);
  });
}

function expandable(label, text) {
  const div = document.createElement("div");
  div.className = "extra";

  const span = document.createElement("span");
  span.className = "truncate";
  span.textContent = text;

  div.innerHTML = `<span class="label">${label}:</span> `;
  div.appendChild(span);

  if (text.length > 140) {
    const more = document.createElement("span");
    more.className = "read-more";
    more.textContent = "Read more";
    more.onclick = () => {
      span.classList.toggle("truncate");
      more.textContent = span.classList.contains("truncate") ? "Read more" : "Show less";
    };
    div.appendChild(more);
  }

  return div;
}

document.getElementById("tradeForm").addEventListener("submit", e => {
  const selected = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(cb => cb.dataset.value);

  if (!selected.length) {
    e.preventDefault();
    alert("Please select at least one title.");
    return;
  }

  document.getElementById("selectedTitles").value = selected.join("\n");
  document.getElementById("emailSubject").value =
    "Trade Request: " + selected.map(v => v.split(" - ")[0]).join(", ");
});
</script>

</body>
</html>
