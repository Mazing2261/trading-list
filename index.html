<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>My Collection</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 40px;
  background: #fafafa;
  color: #222;
}

h1 {
  margin-bottom: 8px;
}

.section {
  margin-top: 40px;
}

.section h2 {
  border-bottom: 2px solid #ddd;
  padding-bottom: 6px;
  margin-bottom: 20px;
}

input[type="search"] {
  width: 100%;
  padding: 10px;
  margin: 20px 0 30px;
  font-size: 16px;
}

.title-card {
  padding: 14px 0;
  border-bottom: 1px solid #ddd;
}

.title-header {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.title-name {
  font-weight: 600;
}

.toggle {
  font-size: 0.85em;
  color: #0066cc;
}

.title-details {
  margin-top: 8px;
  display: none;
}

.title-meta {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 6px;
}

.cast-notes {
  font-size: 0.9em;
  margin-top: 6px;
}

.label {
  font-weight: bold;
}

.truncate {
  max-height: 2.8em;
  overflow: hidden;
}

.read-more {
  color: #0066cc;
  cursor: pointer;
  font-size: 0.85em;
  margin-left: 6px;
}
</style>
</head>

<body>

<h1>My Collection</h1>

<p>
Search or browse my titles below. Feel free to select any you are interested in and fill in the details below to submit your request.
</p>

<input type="search" id="search" placeholder="Search by title or cast..." />

<div id="titles-container"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoRy5TtpW0igavzsGeFPJyxVmfShOncsDrRO_e3CI0MjASPeoL3KJCIs121cMyfwQdzKntycu-BAV3/pub?output=csv";

fetch(CSV_URL)
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    const data = rows.map(r => {
      const cols = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
      return {
        title: clean(cols[0]),
        link: clean(cols[1]),
        location: clean(cols[2]),
        master: clean(cols[3]),
        date: clean(cols[4]),
        format: clean(cols[5]),
        size: clean(cols[6]),
        giftable: clean(cols[7]),
        cast: clean(cols[8]),
        notes: clean(cols[9])
      };
    });

    renderGrouped(data);

    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      renderGrouped(
        data.filter(d =>
          d.title.toLowerCase().includes(q) ||
          d.cast.toLowerCase().includes(q)
        )
      );
    });
  });

function clean(value = "") {
  return value.replace(/^"|"$/g, "").trim();
}

/* Alphabet grouping */
function getGroup(title) {
  const first = title.charAt(0).toUpperCase();
  if (!first.match(/[A-Z]/)) return "0-9 / Special";
  if (first <= "F") return "A – F";
  if (first <= "L") return "G – L";
  if (first <= "R") return "M – R";
  return "S – Z";
}

function renderGrouped(data) {
  const container = document.getElementById("titles-container");
  container.innerHTML = "";

  const groups = {};
  data.forEach(item => {
    const g = getGroup(item.title);
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });

  Object.keys(groups).sort().forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const header = document.createElement("h2");
    header.textContent = group;
    section.appendChild(header);

    groups[group].forEach(item => {
      section.appendChild(renderTitle(item));
    });

    container.appendChild(section);
  });
}

function renderTitle(item) {
  const card = document.createElement("div");
  card.className = "title-card";

  /* HEADER */
  const header = document.createElement("div");
  header.className = "title-header";

  const name = document.createElement("div");
  name.className = "title-name";
  name.textContent = `${item.title} - ${item.link}`;

  const toggle = document.createElement("div");
  toggle.className = "toggle";
  toggle.textContent = "Expand";

  header.appendChild(name);
  header.appendChild(toggle);
  card.appendChild(header);

  /* DETAILS */
  const details = document.createElement("div");
  details.className = "title-details";

  const meta = document.createElement("div");
  meta.className = "title-meta";
  meta.textContent = `${item.location} | ${item.master} | ${item.date} | ${item.format} | ${item.size} | ${item.giftable}`;
  details.appendChild(meta);

  if (item.cast) {
    details.appendChild(buildExpandable("Cast", item.cast));
  }

  if (item.notes) {
    details.appendChild(buildExpandable("Notes", item.notes));
  }

  card.appendChild(details);

  header.addEventListener("click", () => {
    const open = details.style.display === "block";
    details.style.display = open ? "none" : "block";
    toggle.textContent = open ? "Expand" : "Collapse";
  });

  return card;
}

function buildExpandable(label, text) {
  const wrap = document.createElement("div");
  wrap.className = "cast-notes";

  const span = document.createElement("span");
  span.className = "truncate";
  span.textContent = text;

  wrap.innerHTML = `<span class="label">${label}:</span> `;
  wrap.appendChild(span);

  if (text.length > 120) {
    const btn = document.createElement("span");
    btn.className = "read-more";
    btn.textContent = "Read more";
    btn.onclick = () => {
      span.classList.toggle("truncate");
      btn.textContent = span.classList.contains("truncate")
        ? "Read more"
        : "Show less";
    };
    wrap.appendChild(btn);
  }

  return wrap;
}
</script>

</body>
</html>
