<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Trade List</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 40px;
  background: #fafafa;
  color: #222;
}

h1 {
  margin-bottom: 10px;
}

input[type="search"] {
  width: 100%;
  padding: 10px;
  margin-bottom: 24px;
  font-size: 16px;
}

.title-card {
  padding: 14px 0;
  border-bottom: 1px solid #ddd;
}

.title-name {
  font-weight: 600;
  margin-bottom: 6px;
}

.title-meta {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 6px;
}

.cast-notes {
  font-size: 0.9em;
  margin-top: 6px;
}

.label {
  font-weight: bold;
}

.truncate {
  max-height: 2.8em;
  overflow: hidden;
}

.read-more {
  color: #0066cc;
  cursor: pointer;
  font-size: 0.85em;
  margin-left: 4px;
}
</style>
</head>

<body>

<h1>My Trade List</h1>

<p>
Search or browse my titles below. Feel free to select any you are interested in and fill in the details below to submit your request.
</p>

<input type="search" id="search" placeholder="Search by title or cast..." />

<div id="titles-container"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoRy5TtpW0igavzsGeFPJyxVmfShOncsDrRO_e3CI0MjASPeoL3KJCIs121cMyfwQdzKntycu-BAV3/pub?output=csv";

fetch(CSV_URL)
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    const data = rows.map(r => {
      const cols = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
      return {
        title: clean(cols[0]),
        link: clean(cols[1]),
        location: clean(cols[2]),
        master: clean(cols[3]),
        date: clean(cols[4]),
        format: clean(cols[5]),
        size: clean(cols[6]),
        giftable: clean(cols[7]),
        cast: clean(cols[8]),
        notes: clean(cols[9])
      };
    });

    render(data);

    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      render(
        data.filter(d =>
          d.title.toLowerCase().includes(q) ||
          d.cast.toLowerCase().includes(q)
        )
      );
    });
  });

function clean(value = "") {
  return value.replace(/^"|"$/g, "").trim();
}

function render(data) {
  const container = document.getElementById("titles-container");
  container.innerHTML = "";
  data.forEach(item => container.appendChild(renderTitle(item)));
}

function renderTitle(item) {
  const card = document.createElement("div");
  card.className = "title-card";

  /* TITLE */
  const title = document.createElement("div");
  title.className = "title-name";
  title.textContent = `${item.title} - ${item.link}`;
  card.appendChild(title);

  /* META */
  const meta = document.createElement("div");
  meta.className = "title-meta";
  meta.textContent = `${item.location} | ${item.master} | ${item.date} | ${item.format} | ${item.size} | ${item.giftable}`;
  card.appendChild(meta);

  /* CAST */
  if (item.cast) {
    const cast = document.createElement("div");
    cast.className = "cast-notes";
    cast.innerHTML = `
      <span class="label">Cast:</span>
      <span class="truncate">${item.cast}</span>
      ${item.cast.length > 120 ? `<span class="read-more">Read more</span>` : ""}
    `;
    card.appendChild(cast);
  }

  /* NOTES */
  if (item.notes) {
    const notes = document.createElement("div");
    notes.className = "cast-notes";
    notes.innerHTML = `
      <span class="label">Notes:</span>
      <span class="truncate">${item.notes}</span>
      ${item.notes.length > 120 ? `<span class="read-more">Read more</span>` : ""}
    `;
    card.appendChild(notes);
  }

  /* READ MORE HANDLER */
  card.querySelectorAll(".read-more").forEach(btn => {
    btn.addEventListener("click", () => {
      const text = btn.previousElementSibling;
      text.classList.toggle("truncate");
      btn.textContent = text.classList.contains("truncate")
        ? "Read more"
        : "Show less";
    });
  });

  return card;
}
</script>

</body>
</html>
